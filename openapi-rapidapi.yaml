openapi: 3.0.3
info:
  title: Deep
  version: 1.0.0
  description: |
    Deep turns any question into a fully-cited research report with confidence scores. Fact-check claims with verdicts (true, mostly_true, mixed, mostly_false, false, unverifiable) backed by evidence. Compare entities side-by-side. Extract structured data from any URL.

servers:
  - url: https://deep-api-fe9d.onrender.com

paths:

  /health:
    get:
      operationId: health
      summary: Service health
      description: Returns status, version, configured providers, search availability, and active task count.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              example:
                status: ok
                version: "1.0.0"
                providers: [anthropic]
                search: false
                activeTasks: 0
              schema:
                type: object

  /v1/research:
    post:
      operationId: startResearch
      summary: Start an async research task
      description: Submit a question and get back a research task ID. Poll the task endpoint to retrieve the cited report.
      requestBody:
        required: true
        content:
          application/json:
            example:
              query: "current state of quantum computing 2026"
              depth: "standard"
              citations: true
            schema:
              type: object
              required: [query]
              properties:
                query:    { type: string }
                depth:    { type: string }
                citations: { type: boolean }
      responses:
        '202':
          description: Research task accepted
          content:
            application/json:
              example:
                task_id: "rsr_abc123"
                status: "pending"
                eta_seconds: 25
              schema:
                type: object

  /v1/research/quick:
    post:
      operationId: researchQuick
      summary: One-shot synchronous research
      description: Submit a question and get the cited report back in one request. Best for short queries.
      requestBody:
        required: true
        content:
          application/json:
            example:
              query: "who founded Stripe and when"
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
      responses:
        '200':
          description: Research report with citations
          content:
            application/json:
              example:
                query: "who founded Stripe and when"
                summary: "Stripe was founded in 2010 by Irish brothers Patrick and John Collison."
                citations:
                  - { title: "Stripe — About", url: "https://stripe.com/about" }
                confidence: 0.95
              schema:
                type: object

  /v1/research/{id}:
    get:
      operationId: getResearch
      summary: Get a research task result
      description: Retrieve a previously submitted async research task by its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Research task result
          content:
            application/json:
              example:
                task_id: "rsr_abc123"
                status: "complete"
                report: "..."
                citations: []
              schema:
                type: object

  /v1/fact-check:
    post:
      operationId: factCheck
      summary: Fact-check claims
      description: Submit one or more claims and get verdicts (true/mostly_true/mixed/mostly_false/false/unverifiable) with evidence.
      requestBody:
        required: true
        content:
          application/json:
            example:
              claims:
                - "The Earth orbits the Sun in 365.25 days"
            schema:
              type: object
              required: [claims]
              properties:
                claims:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Fact-check verdicts with sources
          content:
            application/json:
              example:
                results:
                  - claim: "The Earth orbits the Sun in 365.25 days"
                    verdict: "mostly_true"
                    evidence: "..."
                    sources: []
              schema:
                type: object

  /v1/compare:
    post:
      operationId: compareEntities
      summary: Compare entities side-by-side
      description: Submit two or more entities (products, technologies, concepts) and get a structured comparison with scoring.
      requestBody:
        required: true
        content:
          application/json:
            example:
              entities: ["React", "Vue", "Svelte"]
              criteria: ["performance", "ecosystem", "learning curve"]
            schema:
              type: object
              required: [entities]
              properties:
                entities:
                  type: array
                  items: { type: string }
                criteria:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Structured comparison
          content:
            application/json:
              example:
                entities: ["React", "Vue", "Svelte"]
                comparison_table: {}
                winner_by_criterion: {}
              schema:
                type: object

  /v1/extract:
    post:
      operationId: extractData
      summary: Extract structured data from a URL
      description: Provide a URL and an optional schema. Returns extracted structured data.
      requestBody:
        required: true
        content:
          application/json:
            example:
              url: "https://example.com/article"
              schema: { title: "string", author: "string", date: "string" }
            schema:
              type: object
              required: [url]
              properties:
                url:    { type: string, format: uri }
                schema: { type: object }
      responses:
        '200':
          description: Extracted structured data
          content:
            application/json:
              example:
                url: "https://example.com/article"
                extracted:
                  title: "Article title"
                  author: "Jane Doe"
                  date: "2026-05-24"
              schema:
                type: object
